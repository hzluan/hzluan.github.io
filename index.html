    <script>
    // Script to completely remove the language switch button
    document.addEventListener('DOMContentLoaded', function() {
      const removeButton = function() {
        const navBar = document.querySelector('.nav-bar ul');
        if (navBar && navBar.children.length > 0) {
          const lastItem = navBar.children[navBar.children.length - 1];
          if (lastItem) {
            // Remove the element completely
            lastItem.parentNode.removeChild(lastItem);
            return true;
          }
        }
        return false;
      };
      
      // Try immediately
      if (!removeButton()) {
        // If not successful, try again after a delay
        const interval = setInterval(function() {
          if (removeButton()) {
            clearInterval(interval);
          }
        }, 100);
      }
    });
    </script>
