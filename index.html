<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Hongzhou Luan's personal website" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Hongzhou Luan</title>
    <link href="/static/css/main.3f09121e.chunk.css" rel="stylesheet">
    <style>
        /* Simple CSS to hide the language switcher li element */
        .nav-bar ul li:last-child {
            display: none !important;
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script src="/static/js/runtime-main.c72e126b.js"></script>
    <script src="/static/js/2.ae2b3713.chunk.js"></script>
    <script src="/static/js/main.d1cf4719.chunk.js"></script>
    
    <script>
    // Script to fix the confusing navigation labels
    document.addEventListener('DOMContentLoaded', function() {
      // Function to update the navigation labels
      const updateNavLabels = function() {
        const navBar = document.querySelector('.nav-bar ul');
        if (navBar && navBar.children.length >= 4) {
          // Find the second nav item (index 1) which is "News" -> "Updates"
          const newsItem = navBar.children[1].querySelector('a');
          if (newsItem && newsItem.getAttribute('href') === '#resume') {
            const textNode = Array.from(newsItem.childNodes).find(node => 
              node.nodeType === Node.TEXT_NODE);
            if (textNode) {
              textNode.nodeValue = 'Updates';
            }
          }
          
          // Find the third nav item (index 2) which is "Gallery" -> "Photos"
          const galleryItem = navBar.children[2].querySelector('a');
          if (galleryItem && galleryItem.getAttribute('href') === '#works') {
            const textNode = Array.from(galleryItem.childNodes).find(node => 
              node.nodeType === Node.TEXT_NODE);
            if (textNode) {
              textNode.nodeValue = 'Photos';
            }
          }
          
          return true;
        }
        return false;
      };
      
      // Try immediately
      if (!updateNavLabels()) {
        // Try again after a delay
        const interval = setInterval(function() {
          if (updateNavLabels()) {
            clearInterval(interval);
          }
        }, 100);
      }
    });
    </script>
</body>
</html>
