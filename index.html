<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Hongzhou Luan's personal website" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Hongzhou Luan</title>
    <link href="/static/css/main.3f09121e.chunk.css" rel="stylesheet">
    <style>
        /* Hide language switcher */
        .nav-bar ul li:last-child {
            display: none !important;
        }
        
        /* Split layout styles */
        .intro-section {
            min-height: 100vh;
            display: flex !important;
            flex-direction: row !important;
            background-image: none !important;
        }
        
        .intro-left {
            width: 60%;
            background-color: rgba(0, 0, 0, 0.7);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            overflow: hidden; /* Keep particles contained */
        }
        
        .intro-right {
            width: 40%;
            background-image: url('/upload/Hongzhou_bg.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        /* Remove any overlay from the right column */
        .intro-right::before {
            display: none !important;
        }
        
        /* Content styling */
        .intro-content {
            position: relative;
            z-index: 10;
        }
        
        /* Preserve the original highlight color */
        .highlight {
            color: rgb(255, 231, 204) !important;
        }
        
        .intro-section h2, 
        .intro-section h3 {
            text-align: left !important;
            padding-left: 20px !important;
        }
        
        /* Social media links alignment */
        .social-links {
            display: flex !important;
            justify-content: flex-start !important;
            padding-left: 20px !important;
            margin-top: 15px !important;
        }
        
        .social-links a {
            margin-right: 15px !important;
        }
        
        /* Particles container */
        #particles-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
        }
        
        /* Canvas styling for particles */
        canvas.particles-js-canvas-el {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .intro-section {
                flex-direction: column !important;
            }
            
            .intro-left, 
            .intro-right {
                width: 100% !important;
            }
            
            .intro-right {
                height: 50vh !important;
            }
            
            .intro-left {
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script src="/static/js/runtime-main.c72e126b.js"></script>
    <script src="/static/js/2.ae2b3713.chunk.js"></script>
    <script src="/static/js/main.d1cf4719.chunk.js"></script>
    
    <script>
    // Script to implement the split layout and fix navigation labels
    document.addEventListener('DOMContentLoaded', function() {
      // Implement split layout
      const createSplitLayout = function() {
        const introSection = document.querySelector('.intro-section');
        
        if (introSection && !introSection.classList.contains('split-modified')) {
          console.log('Creating split layout for intro section');
          
          // Save original content
          const originalContent = introSection.innerHTML;
          
          // Clear the intro section
          introSection.innerHTML = '';
          
          // Add split-modified class
          introSection.classList.add('split-modified');
          
          // Create left column with particles
          const leftColumn = document.createElement('div');
          leftColumn.className = 'intro-left';
          
          // Create right column with image
          const rightColumn = document.createElement('div');
          rightColumn.className = 'intro-right';
          
          // Create particles container for left side only
          const particlesContainer = document.createElement('div');
          particlesContainer.id = 'particles-container';
          
          // Create content container
          const contentContainer = document.createElement('div');
          contentContainer.className = 'intro-content';
          contentContainer.innerHTML = originalContent;
          
          // Assemble the structure
          leftColumn.appendChild(particlesContainer);
          leftColumn.appendChild(contentContainer);
          introSection.appendChild(leftColumn);
          introSection.appendChild(rightColumn);
          
          // Handle the particles canvas
          const checkAndMoveParticles = function() {
            const particlesCanvas = document.querySelector('canvas.particles-js-canvas-el');
            if (particlesCanvas) {
              // Clone the canvas to break any existing connections
              const newCanvas = particlesCanvas.cloneNode(true);
              // Style the new canvas
              newCanvas.style.position = 'absolute';
              newCanvas.style.top = '0';
              newCanvas.style.left = '0';
              newCanvas.style.width = '100%';
              newCanvas.style.height = '100%';
              
              // Add it to our container
              particlesContainer.appendChild(newCanvas);
              
              // Hide the original canvas
              particlesCanvas.style.display = 'none';
              
              return true;
            }
            return false;
          };
          
          // Try to move the particles canvas immediately
          if (!checkAndMoveParticles()) {
            // If not found immediately, try again after a delay
            let attempts = 0;
            const particlesInterval = setInterval(function() {
              if (checkAndMoveParticles() || attempts > 20) {
                clearInterval(particlesInterval);
              }
              attempts++;
            }, 200);
          }
          
          return true;
        }
        return false;
      };
      
      // Fix navigation labels
      const updateNavLabels = function() {
        const navBar = document.querySelector('.nav-bar ul');
        if (navBar && navBar.children.length >= 4) {
          // Change "News" to "Updates" and href from "#resume" to "#updates"
          const newsItem = navBar.children[1].querySelector('a');
          if (newsItem && newsItem.getAttribute('href') === '#resume') {
            // Update the navigation label
            const textNode = Array.from(newsItem.childNodes).find(node => 
              node.nodeType === Node.TEXT_NODE);
            if (textNode) {
              textNode.nodeValue = 'Updates';
            }
            
            // Update the href attribute
            newsItem.setAttribute('href', '#updates');
            
            // Also update the resume section ID to match the new link
            const resumeSection = document.querySelector('#resume');
            if (resumeSection) {
              resumeSection.id = 'updates';
            }
          }
          
          // Change "Gallery" to "Photos"
          const galleryItem = navBar.children[2].querySelector('a');
          if (galleryItem && galleryItem.getAttribute('href') === '#works') {
            const textNode = Array.from(galleryItem.childNodes).find(node => 
              node.nodeType === Node.TEXT_NODE);
            if (textNode) {
              textNode.nodeValue = 'Photos';
            }
          }
          
          return true;
        }
        return false;
      };
      
      // Execute both functions with retry
      const executeWithRetry = function(fn, interval) {
        if (!fn()) {
          const intervalId = setInterval(function() {
            if (fn()) {
              clearInterval(intervalId);
            }
          }, interval || 100);
        }
      };
      
      executeWithRetry(createSplitLayout);
      executeWithRetry(updateNavLabels);
    });
    </script>
</body>
</html>
